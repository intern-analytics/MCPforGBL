<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand MCP | Admin Console</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(79, 70, 229, 0.1) 0px, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Glassmorphism Navigation */
        nav {
            backdrop-filter: blur(12px);
            background: rgba(15, 23, 42, 0.8);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-weight: 700;
            font-size: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1.5rem;
            width: 100%;
            flex: 1;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 1.5rem;
            border-radius: 1rem;
            backdrop-filter: blur(8px);
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
        }

        /* Main Content Area */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            padding: 0.625rem 1.25rem;
            border-radius: 0.5rem;
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
            border: none;
            gap: 0.5rem;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-main);
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        /* Table Design */
        .table-container {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1rem;
            overflow: hidden;
            backdrop-filter: blur(8px);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            padding: 1rem 1.5rem;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.875rem;
            border-bottom: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.02);
        }

        td {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.875rem;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        .badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-active { background: rgba(16, 185, 129, 0.1); color: var(--success); }
        .badge-expired { background: rgba(239, 68, 68, 0.1); color: var(--danger); }
        .badge-pending { background: rgba(245, 158, 11, 0.1); color: var(--warning); }

        code {
            font-family: 'JetBrains Mono', monospace;
            background: rgba(15, 23, 42, 0.5);
            padding: 0.2rem 0.4rem;
            border-radius: 0.25rem;
            color: #818cf8;
        }

        .actions {
            display: flex;
            gap: 0.75rem;
        }

        .btn-icon {
            padding: 0.4rem;
            border-radius: 0.4rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            cursor: pointer;
            color: var(--text-muted);
        }

        .btn-icon:hover {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.1);
        }

        /* Modal Overlay */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal {
            background: #1e293b;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 450px;
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
        }

        input {
            width: 100%;
            padding: 0.75rem;
            border-radius: 0.5rem;
            background: #0f172a;
            border: 1px solid var(--border);
            color: white;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        /* Result display for new key */
        .result-box {
            background: #0f172a;
            padding: 1rem;
            border-radius: 0.5rem;
            margin-top: 1rem;
            border-left: 4px solid var(--success);
            display: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade {
            animation: fadeIn 0.4s ease forwards;
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            Brand MCP Control
        </div>
        <div style="display: flex; gap: 1rem; align-items: center;">
            <div id="connection-status" class="badge badge-active">API Connected</div>
            <button class="btn btn-outline" onclick="fetchKeys()">Refresh</button>
        </div>
    </nav>

    <div class="container animate-fade">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Total Tenants</div>
                <div class="stat-value" id="stat-total">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Active Keys</div>
                <div class="stat-value" style="color: var(--success)" id="stat-active">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Expired</div>
                <div class="stat-value" style="color: var(--danger)" id="stat-expired">0</div>
            </div>
        </div>

        <div class="section-header">
            <h2>Key Management</h2>
            <button class="btn btn-primary" onclick="showModal()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                Provision New Key
            </button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Database User</th>
                        <th>API Key Prefix</th>
                        <th>Expiration Date</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="keys-table-body">
                    <!-- Rows injected here -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Generate Modal -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <h3 style="margin-bottom: 1.5rem;">Generate Access Token</h3>
            <div class="form-group">
                <label>Database Username</label>
                <input type="text" id="db_user" placeholder="e.g. user_analytics">
            </div>
            <div class="form-group">
                <label>Database Password</label>
                <input type="password" id="db_pass" placeholder="••••••••">
            </div>
            
            <div id="key-result" class="result-box">
                <label>API KEY GENERATED (SAVE NOW!)</label>
                <code id="display-new-key" style="display: block; word-break: break-all; margin-top: 0.5rem; font-size: 0.8rem;"></code>
            </div>

            <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                <button class="btn btn-outline" style="flex: 1;" onclick="hideModal()">Close</button>
                <button id="generate-btn" class="btn btn-primary" style="flex: 2;" onclick="generateKey()">Generate Key</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = ""; // Relative to the host

        async function fetchKeys() {
            try {
                const response = await fetch(`${API_BASE}/keys`);
                const data = await response.json();
                renderTable(data.managed_keys);
            } catch (err) {
                console.error("Failed to fetch keys", err);
                document.getElementById('connection-status').textContent = "Connection Lost";
                document.getElementById('connection-status').className = "badge badge-expired";
            }
        }

        function renderTable(keys) {
            const tbody = document.getElementById('keys-table-body');
            tbody.innerHTML = '';
            
            let active = 0, expired = 0;

            keys.forEach(key => {
                const row = document.createElement('tr');
                
                const statusClass = key.status === 'Active' ? 'badge-active' : (key.status === 'Expired' ? 'badge-expired' : 'badge-pending');
                if (key.status === 'Active') active++;
                if (key.status === 'Expired') expired++;

                const dateStr = key.expires_at ? new Date(key.expires_at).toLocaleDateString() : 'N/A';

                row.innerHTML = `
                    <td>${key.db_user}</td>
                    <td><code>${key.key_prefix}</code></td>
                    <td>${dateStr}</td>
                    <td><span class="badge ${statusClass}">${key.status}</span></td>
                    <td class="actions">
                        <button class="btn-icon" title="Revalidate" onclick="revalidateKey('${key.db_user}')">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"></path><path d="M1 20v-6h6"></path><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
                        </button>
                        <button class="btn-icon" style="color: var(--danger)" title="Revoke" onclick="revokeKey('${key.db_user}')">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                        </button>
                    </td>
                `;
                tbody.appendChild(row);
            });

            document.getElementById('stat-total').textContent = keys.length;
            document.getElementById('stat-active').textContent = active;
            document.getElementById('stat-expired').textContent = expired;
        }

        async function generateKey() {
            const user = document.getElementById('db_user').value;
            const pass = document.getElementById('db_pass').value;
            const btn = document.getElementById('generate-btn');

            if (!user || !pass) return alert("Please fill in both fields");

            btn.disabled = true;
            btn.textContent = "Generating...";

            try {
                const response = await fetch(`${API_BASE}/keys/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ db_user: user, db_pass: pass })
                });
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('key-result').style.display = 'block';
                    document.getElementById('display-new-key').textContent = data.api_key;
                    btn.style.display = 'none';
                    fetchKeys();
                } else {
                    alert("Error: " + data.detail);
                }
            } catch (err) {
                alert("Request failed");
            } finally {
                btn.disabled = false;
                btn.textContent = "Generate Key";
            }
        }

        async function revokeKey(db_user) {
            if (!confirm(`Are you sure you want to revoke access for ${db_user}?`)) return;
            
            try {
                await fetch(`${API_BASE}/keys/${db_user}`, { method: 'DELETE' });
                fetchKeys();
            } catch (err) {
                alert("Revoke failed");
            }
        }

        async function revalidateKey(db_user) {
            try {
                await fetch(`${API_BASE}/keys/${db_user}/revalidate`, { method: 'PUT' });
                fetchKeys();
                alert(`Successfully extended access for ${db_user} by 90 days.`);
            } catch (err) {
                alert("Revalidation failed");
            }
        }

        function showModal() {
            document.getElementById('modal-overlay').style.display = 'flex';
            document.getElementById('key-result').style.display = 'none';
            document.getElementById('generate-btn').style.display = 'block';
            document.getElementById('db_user').value = '';
            document.getElementById('db_pass').value = '';
        }

        function hideModal() {
            document.getElementById('modal-overlay').style.display = 'none';
        }

        // Initialize
        fetchKeys();
        // Auto-refresh every 30s
        setInterval(fetchKeys, 30000);
    </script>
</body>
</html>
